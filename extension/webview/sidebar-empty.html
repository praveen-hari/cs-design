<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Design — Empty</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--vscode-sideBar-background);
      color: var(--vscode-foreground);
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      line-height: 1.4;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Empty State ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
    }

    .empty-state__icon {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
    }

    .empty-state__title {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .empty-state__description {
      font-size: 12px;
      color: var(--vscode-descriptionForeground);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 20px;
      max-width: 240px;
    }

    /* ── Buttons ── */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 260px;
      margin-bottom: 24px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 30px;
      padding: 0 16px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: var(--vscode-font-size);
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: var(--vscode-button-hoverBackground);
    }

    .btn-primary:focus-visible {
      outline: 1px solid var(--vscode-focusBorder);
      outline-offset: 1px;
    }

    .btn-primary svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 30px;
      padding: 0 16px;
      background: transparent;
      color: var(--vscode-foreground);
      border: 1px solid var(--vscode-panel-border);
      border-radius: 4px;
      font-family: inherit;
      font-size: var(--vscode-font-size);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: var(--vscode-list-hoverBackground);
      border-color: var(--vscode-foreground);
    }

    .btn-secondary:focus-visible {
      outline: 1px solid var(--vscode-focusBorder);
      outline-offset: 1px;
    }

    .btn-secondary svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 260px;
      margin-bottom: 20px;
    }

    .divider__line { flex: 1; height: 1px; background: var(--vscode-panel-border); }
    .divider__text { font-size: 11px; color: var(--vscode-descriptionForeground); white-space: nowrap; }

    /* ── System Items ── */
    .systems { width: 100%; max-width: 260px; }
    .systems__list { display: flex; flex-direction: column; gap: 2px; }

    .system-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: inherit;
    }

    .system-item:hover { background: var(--vscode-list-hoverBackground); }
    .system-item:focus-visible { outline: 1px solid var(--vscode-focusBorder); outline-offset: -1px; }

    .system-item__swatches { display: flex; gap: 3px; flex-shrink: 0; }
    .system-item__swatch {
      width: 10px; height: 10px; border-radius: 2px;
      border: 1px solid rgba(128, 128, 128, 0.2);
    }

    .system-item__info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .system-item__name { font-size: 12px; font-weight: 400; line-height: 1.3; }
    .system-item__desc { font-size: 11px; color: var(--vscode-descriptionForeground); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 260px;
    }

    .footer__link { font-size: 11px; color: var(--vscode-textLink-foreground); text-decoration: none; cursor: pointer; padding: 2px 0; }
    .footer__link:hover { text-decoration: underline; }
    .footer__link:focus-visible { outline: 1px solid var(--vscode-focusBorder); outline-offset: 2px; border-radius: 2px; }
    .footer__separator { font-size: 11px; color: var(--vscode-panel-border); padding: 2px 0; }
  </style>
</head>
<body>

  <div class="empty-state">

    <!-- Icon -->
    <div class="empty-state__icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4L44 24L24 44L4 24L24 4Z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3"/>
        <path d="M24 10L38 24L24 38L10 24L24 10Z" stroke="currentColor" stroke-width="1" fill="none" opacity="0.15"/>
        <circle cx="18" cy="22" r="3" fill="var(--vscode-textLink-foreground)" opacity="0.9"/>
        <circle cx="26" cy="18" r="2.5" fill="var(--vscode-testing-iconPassed)" opacity="0.8"/>
        <circle cx="30" cy="26" r="2" fill="var(--vscode-editorWarning-foreground)" opacity="0.7"/>
        <circle cx="22" cy="29" r="2.5" fill="var(--vscode-errorForeground)" opacity="0.7"/>
        <path d="M32 14L36 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <path d="M36 10L38 8" stroke="var(--vscode-textLink-foreground)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      </svg>
    </div>

    <h2 class="empty-state__title">No design project found</h2>
    <p class="empty-state__description">Create a design system to start designing screens, generating production code, and previewing in the browser.</p>

    <!-- Buttons -->
    <div class="button-group">
      <button class="btn-primary" aria-label="Create Design System" data-cmd="openChat" data-value="Create a DESIGN.md design system for this workspace. Ask me about my brand style, colors, typography, and spacing preferences.">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 7v1H8v6H7V8H1V7h6V1h1v6h6z"/></svg>
        Create Design System
      </button>

      <button class="btn-secondary" aria-label="Import from Workspace" data-cmd="openChat" data-value="Extract a DESIGN.md design system from existing CSS files, config files, and theme settings in this workspace.">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.06 7.354L8 10.414l-3.06-3.06.706-.708L7.5 8.5V1h1v7.5l1.854-1.854.706.708zM3.5 13h9v-3h1v3.5a.5.5 0 0 1-.5.5H3a.5.5 0 0 1-.5-.5V10h1v3z"/></svg>
        Import from Workspace
      </button>

      <button class="btn-secondary" aria-label="Design from Screenshot" data-cmd="openChat" data-value="Create a DESIGN.md design system from a screenshot or mockup image. Extract colors, typography, and spacing from the attached image.">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zm0 13H2V2h12v12zM4 11l2.5-3 1.5 2 2.5-3L13 11H4z"/></svg>
        Design from Screenshot
      </button>

      <button class="btn-secondary" aria-label="Design from URL" data-cmd="openChat" data-value="Extract a DESIGN.md design system from a website URL. Analyze the site's colors, typography, and spacing.">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 13A6 6 0 1 1 8 2a6 6 0 0 1 0 12zM7 4h2v1H7V4zm0 2h2v5H7V6z"/></svg>
        Design from URL
      </button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider__line"></div>
      <span class="divider__text">or use a built-in system</span>
      <div class="divider__line"></div>
    </div>

    <!-- Built-in Systems -->
    <div class="systems">
      <div class="systems__list">
        <button class="system-item" aria-label="Use Modern Minimal design system" data-cmd="initSystem" data-value="modern-minimal">
          <div class="system-item__swatches">
            <div class="system-item__swatch" style="background: #1A1C1E;"></div>
            <div class="system-item__swatch" style="background: #6C7278;"></div>
            <div class="system-item__swatch" style="background: #2563EB;"></div>
            <div class="system-item__swatch" style="background: #FFFFFF;"></div>
            <div class="system-item__swatch" style="background: #F8FAFC;"></div>
          </div>
          <div class="system-item__info">
            <span class="system-item__name">Modern Minimal</span>
            <span class="system-item__desc">Clean SaaS · Inter · Blue accent</span>
          </div>
        </button>

        <button class="system-item" aria-label="Use Corporate Clean design system" data-cmd="initSystem" data-value="corporate-clean">
          <div class="system-item__swatches">
            <div class="system-item__swatch" style="background: #1B2A4A;"></div>
            <div class="system-item__swatch" style="background: #64748B;"></div>
            <div class="system-item__swatch" style="background: #0F766E;"></div>
            <div class="system-item__swatch" style="background: #FFFFFF;"></div>
            <div class="system-item__swatch" style="background: #F1F5F9;"></div>
          </div>
          <div class="system-item__info">
            <span class="system-item__name">Corporate Clean</span>
            <span class="system-item__desc">Enterprise · Source Sans · Teal</span>
          </div>
        </button>

        <button class="system-item" aria-label="Use Bold Creative design system" data-cmd="initSystem" data-value="bold-creative">
          <div class="system-item__swatches">
            <div class="system-item__swatch" style="background: #1E1033;"></div>
            <div class="system-item__swatch" style="background: #7C6F9B;"></div>
            <div class="system-item__swatch" style="background: #E040FB;"></div>
            <div class="system-item__swatch" style="background: #FFFBFE;"></div>
            <div class="system-item__swatch" style="background: #F5F0FF;"></div>
          </div>
          <div class="system-item__info">
            <span class="system-item__name">Bold Creative</span>
            <span class="system-item__desc">Vibrant · Poppins · Playful</span>
          </div>
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a class="footer__link" href="#" aria-label="Open documentation">Docs</a>
      <span class="footer__separator">·</span>
      <a class="footer__link" href="#" aria-label="View keyboard shortcuts">Shortcuts</a>
      <span class="footer__separator">·</span>
      <a class="footer__link" href="#" aria-label="Send feedback">Feedback</a>
    </div>

  </div>

  <script>
    const vscode = acquireVsCodeApi();
    document.addEventListener('click', (e) => {
      const item = e.target.closest('[data-cmd]');
      if (!item) return;
      const cmd = item.dataset.cmd;
      const value = item.dataset.value;
      const msg = { command: cmd };
      if (cmd === 'initSystem') msg.system = value;
      if (cmd === 'openChat') msg.prompt = value;
      vscode.postMessage(msg);
    });
  </script>

</body>
</html>
