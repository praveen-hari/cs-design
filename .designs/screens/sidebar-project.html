<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Design — Sidebar with Project</title>

  <!-- Shared design tokens -->
  <link rel="stylesheet" href="../tokens.css" />

  <!-- VS Code Codicons -->
  <link rel="stylesheet" href="https://microsoft.github.io/vscode-codicons/dist/codicon.css" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Sidebar Container ── */
    body {
      background: var(--color-sidebarBackground);
      color: var(--color-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: var(--font-body-size);
      line-height: var(--font-body-line-height);
      width: 300px;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── View Header ── */
    .view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 20px;
      height: 35px;
      background: var(--color-sidebarBackground);
      border-bottom: 1px solid var(--color-border);
      user-select: none;
    }

    .view-header__title {
      font-size: var(--font-caption-size);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-primary);
    }

    .view-header__actions {
      display: flex;
      gap: 2px;
    }

    /* ── Icon Button (reusable) ── */
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: var(--color-primary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      opacity: 0.7;
      transition: background 0.1s, opacity 0.1s;
      font-size: 16px;
    }

    .icon-btn:hover {
      background: var(--color-listHoverBackground);
      opacity: 1;
    }

    .icon-btn:focus-visible {
      outline: 1px solid var(--color-focusBorder);
      outline-offset: -1px;
      opacity: 1;
    }

    /* ── Section ── */
    .section {
      border-bottom: 1px solid var(--color-border);
    }

    .section:last-child {
      border-bottom: none;
    }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 22px;
      padding: 0 10px 0 0;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }

    .section-header:hover {
      background: var(--color-listHoverBackground);
    }

    .section-header__left {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .section-header__chevron {
      width: 20px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-primary);
      font-size: 16px;
    }

    .section--collapsed .section-header__chevron .codicon {
      transform: rotate(-90deg);
    }

    .section-header__label {
      font-size: var(--font-caption-size);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-primary);
      white-space: nowrap;
    }

    .section-header__badge {
      font-size: 10px;
      font-weight: 600;
      color: #FFFFFF;
      background: var(--color-badgeBackground);
      border-radius: var(--radius-full);
      padding: 0 5px;
      height: 16px;
      line-height: 16px;
      flex-shrink: 0;
      margin-left: 6px;
    }

    .section-header__right {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .section-header:hover .section-header__right {
      opacity: 1;
    }

    .section--collapsed .section-body {
      display: none;
    }

    /* ── Validation Bar ── */
    .validation-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: var(--color-background);
      border-bottom: 1px solid var(--color-border);
      font-size: var(--font-caption-size);
    }

    .validation-bar__status {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--color-success);
    }

    .validation-bar__status .codicon {
      font-size: 14px;
    }

    .validation-bar__system {
      margin-left: auto;
      color: var(--color-descriptionForeground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Tree Items ── */
    .tree {
      padding: 2px 0;
    }

    .tree-item {
      display: flex;
      align-items: center;
      height: 22px;
      padding: 0 10px 0 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      gap: 6px;
      border: none;
      background: transparent;
      width: 100%;
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      text-align: left;
    }

    .tree-item:hover {
      background: var(--color-listHoverBackground);
    }

    .tree-item:focus-visible {
      outline: 1px solid var(--color-focusBorder);
      outline-offset: -1px;
    }

    .tree-item--active {
      background: var(--color-listActiveBackground);
    }

    .tree-item--active:hover {
      background: var(--color-listActiveBackground);
    }

    .tree-item__icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    .tree-item__label {
      font-size: var(--font-small-size);
      color: var(--color-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .tree-item__detail {
      font-size: var(--font-caption-size);
      color: var(--color-descriptionForeground);
      flex-shrink: 0;
      margin-left: auto;
    }

    .tree-item__actions {
      display: none;
      gap: 2px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .tree-item:hover .tree-item__actions {
      display: flex;
    }

    .tree-item:hover .tree-item__detail--hide {
      display: none;
    }

    /* Nested icon buttons inside tree items */
    .tree-item .icon-btn {
      width: 18px;
      height: 18px;
      font-size: 14px;
    }

    /* Icon color helpers */
    .icon--accent { color: var(--color-accent); }
    .icon--warning { color: var(--color-warning); }
    .icon--success { color: var(--color-success); }
    .icon--secondary { color: var(--color-secondary); }
  </style>
</head>
<body>

  <!-- View Header -->
  <div class="view-header">
    <span class="view-header__title">CS Design</span>
    <div class="view-header__actions">
      <button class="icon-btn" aria-label="New Screen" title="New Screen"><i class="codicon codicon-add"></i></button>
      <button class="icon-btn" aria-label="Validate" title="Validate"><i class="codicon codicon-check"></i></button>
      <button class="icon-btn" aria-label="Refresh" title="Refresh"><i class="codicon codicon-refresh"></i></button>
      <button class="icon-btn" aria-label="More Actions" title="More Actions"><i class="codicon codicon-ellipsis"></i></button>
    </div>
  </div>

  <!-- Validation Bar -->
  <div class="validation-bar">
    <div class="validation-bar__status">
      <i class="codicon codicon-pass-filled"></i>
      <span>Valid</span>
    </div>
    <span class="validation-bar__system">Code Studio Dark</span>
  </div>

  <!-- SECTION: Design System -->
  <div class="section">
    <div class="section-header" role="button" tabindex="0" aria-expanded="true">
      <div class="section-header__left">
        <div class="section-header__chevron"><i class="codicon codicon-chevron-down"></i></div>
        <span class="section-header__label">Design System</span>
      </div>
      <div class="section-header__right">
        <button class="icon-btn" aria-label="Edit" title="Open in Editor"><i class="codicon codicon-edit"></i></button>
      </div>
    </div>
    <div class="section-body">
      <div class="tree">
        <div class="tree-item" role="button" tabindex="0" title="Open Colors in Token Editor">
          <div class="tree-item__icon icon--accent"><i class="codicon codicon-symbol-color"></i></div>
          <span class="tree-item__label">Colors</span>
          <span class="tree-item__detail tree-item__detail--hide">23</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Edit Colors"><i class="codicon codicon-go-to-file"></i></button>
          </div>
        </div>
        <div class="tree-item" role="button" tabindex="0" title="Open Typography in Token Editor">
          <div class="tree-item__icon icon--accent"><i class="codicon codicon-text-size"></i></div>
          <span class="tree-item__label">Typography</span>
          <span class="tree-item__detail tree-item__detail--hide">8</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Edit Typography"><i class="codicon codicon-go-to-file"></i></button>
          </div>
        </div>
        <div class="tree-item" role="button" tabindex="0" title="Open Spacing in Token Editor">
          <div class="tree-item__icon icon--accent"><i class="codicon codicon-symbol-ruler"></i></div>
          <span class="tree-item__label">Spacing</span>
          <span class="tree-item__detail tree-item__detail--hide">7</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Edit Spacing"><i class="codicon codicon-go-to-file"></i></button>
          </div>
        </div>
        <div class="tree-item" role="button" tabindex="0" title="Open Rounded in Token Editor">
          <div class="tree-item__icon icon--accent"><i class="codicon codicon-primitive-square"></i></div>
          <span class="tree-item__label">Rounded</span>
          <span class="tree-item__detail tree-item__detail--hide">5</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Edit Rounded"><i class="codicon codicon-go-to-file"></i></button>
          </div>
        </div>
        <div class="tree-item" role="button" tabindex="0" title="Open Components in Token Editor">
          <div class="tree-item__icon icon--accent"><i class="codicon codicon-symbol-class"></i></div>
          <span class="tree-item__label">Components</span>
          <span class="tree-item__detail tree-item__detail--hide">6</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Edit Components"><i class="codicon codicon-go-to-file"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION: Screens -->
  <div class="section">
    <div class="section-header" role="button" tabindex="0" aria-expanded="true">
      <div class="section-header__left">
        <div class="section-header__chevron"><i class="codicon codicon-chevron-down"></i></div>
        <span class="section-header__label">Screens</span>
        <span class="section-header__badge">3</span>
      </div>
      <div class="section-header__right">
        <button class="icon-btn" aria-label="New Screen" title="New Screen"><i class="codicon codicon-add"></i></button>
        <button class="icon-btn" aria-label="Preview All" title="Preview All"><i class="codicon codicon-open-preview"></i></button>
      </div>
    </div>
    <div class="section-body">
      <div class="tree">
        <div class="tree-item tree-item--active" role="button" tabindex="0" aria-label="landing-page.html">
          <div class="tree-item__icon icon--warning"><i class="codicon codicon-browser"></i></div>
          <span class="tree-item__label">landing-page.html</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Preview in Browser"><i class="codicon codicon-open-preview"></i></button>
            <button class="icon-btn" title="Delete"><i class="codicon codicon-trash"></i></button>
          </div>
        </div>
        <div class="tree-item" role="button" tabindex="0" aria-label="dashboard.html">
          <div class="tree-item__icon icon--warning"><i class="codicon codicon-browser"></i></div>
          <span class="tree-item__label">dashboard.html</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Preview in Browser"><i class="codicon codicon-open-preview"></i></button>
            <button class="icon-btn" title="Delete"><i class="codicon codicon-trash"></i></button>
          </div>
        </div>
        <div class="tree-item" role="button" tabindex="0" aria-label="settings.html">
          <div class="tree-item__icon icon--warning"><i class="codicon codicon-browser"></i></div>
          <span class="tree-item__label">settings.html</span>
          <div class="tree-item__actions">
            <button class="icon-btn" title="Preview in Browser"><i class="codicon codicon-open-preview"></i></button>
            <button class="icon-btn" title="Delete"><i class="codicon codicon-trash"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION: Quick Actions -->
  <div class="section">
    <div class="section-header" role="button" tabindex="0" aria-expanded="true">
      <div class="section-header__left">
        <div class="section-header__chevron"><i class="codicon codicon-chevron-down"></i></div>
        <span class="section-header__label">Quick Actions</span>
      </div>
    </div>
    <div class="section-body">
      <div class="tree">
        <div class="tree-item" role="button" tabindex="0" aria-label="Export Tokens">
          <div class="tree-item__icon icon--secondary"><i class="codicon codicon-export"></i></div>
          <span class="tree-item__label">Export Tokens</span>
        </div>
        <div class="tree-item" role="button" tabindex="0" aria-label="Switch Design System">
          <div class="tree-item__icon icon--secondary"><i class="codicon codicon-arrow-swap"></i></div>
          <span class="tree-item__label">Switch Design System</span>
        </div>
        <div class="tree-item" role="button" tabindex="0" aria-label="Open DESIGN.md">
          <div class="tree-item__icon icon--secondary"><i class="codicon codicon-file"></i></div>
          <span class="tree-item__label">Open DESIGN.md</span>
        </div>
        <div class="tree-item" role="button" tabindex="0" aria-label="Generate Production Code">
          <div class="tree-item__icon icon--secondary"><i class="codicon codicon-code"></i></div>
          <span class="tree-item__label">Generate Production Code</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
